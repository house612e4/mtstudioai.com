<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Diagnostic — MT Studio</title>
<style>
  body{background:#050B14;color:#e2e8f0;font-family:system-ui,sans-serif;padding:20px;line-height:1.7;}
  h1{font-size:20px;color:#22d3ee;margin-bottom:16px;}
  .box{background:#0A0F1C;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;margin-bottom:12px;word-break:break-word;}
  .ok{color:#4ade80;font-weight:700;}
  .err{color:#f87171;font-weight:700;}
  .label{color:#94a3b8;font-size:13px;}
  pre{white-space:pre-wrap;font-size:13px;background:#03060d;padding:12px;border-radius:8px;overflow-x:auto;}
</style>
</head>
<body>
  <h1>🔍 Blog Diagnostic</h1>
  <div id="out"><div class="box">পরীক্ষা চলছে... অপেক্ষা করুন।</div></div>

  <script type="module">
    const out = document.getElementById('out');
    function log(html){ out.innerHTML += `<div class="box">${html}</div>`; }
    out.innerHTML = '';

    try {
      log('<span class="label">ধাপ ১:</span> Firebase লোড করা হচ্ছে...');
      const appMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const fsMod  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      log('<span class="ok">✓ Firebase লোড হয়েছে</span>');

      const app = appMod.initializeApp({
        apiKey: "AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
        authDomain: "mt-studio-92d1e.firebaseapp.com",
        projectId: "mt-studio-92d1e",
        storageBucket: "mt-studio-92d1e.firebasestorage.app",
        messagingSenderId: "455687864985",
        appId: "1:455687864985:web:327dedaffdb7b5f8606e08"
      });
      const db = fsMod.getFirestore(app);
      log('<span class="ok">✓ Firestore কানেক্ট হয়েছে</span>');

      // Test 1: simple read, no query
      log('<span class="label">ধাপ ২:</span> blogPosts collection পড়া হচ্ছে (simple read)...');
      try {
        const snap = await fsMod.getDocs(fsMod.collection(db, 'blogPosts'));
        log(`<span class="ok">✓ সফল!</span> মোট পোস্ট: <b>${snap.size}</b>`);
        let details = '';
        snap.forEach(d => {
          const data = d.data();
          details += `টাইটেল: ${data.title || '(নেই)'}\nstatus: ${data.status || '(নেই)'}\ncategory: ${data.category || '(নেই)'}\ncreatedAt: ${data.createdAt ? 'আছে ✓' : 'নেই ✗'}\n---\n`;
        });
        if(snap.size > 0) log(`<pre>${details}</pre>`);
        else log('<span class="err">⚠ collection খালি — কোনো পোস্ট নেই।</span>');
      } catch(e) {
        log(`<span class="err">✗ Simple read ব্যর্থ:</span><pre>${e.code || ''}\n${e.message}</pre>`);
      }

      // Test 2: the exact query the site uses (orderBy)
      log('<span class="label">ধাপ ৩:</span> orderBy query টেস্ট করা হচ্ছে...');
      try {
        const q = fsMod.query(fsMod.collection(db, 'blogPosts'), fsMod.orderBy('createdAt','desc'));
        const snap = await fsMod.getDocs(q);
        const published = snap.docs.map(d=>d.data()).filter(p=>p.status==='published');
        log(`<span class="ok">✓ orderBy সফল!</span> মোট: ${snap.size}, published: <b>${published.length}</b>`);
      } catch(e) {
        log(`<span class="err">✗ orderBy ব্যর্থ:</span><pre>${e.code || ''}\n${e.message}</pre>`);
      }

      log('<span class="ok">✅ পরীক্ষা শেষ। উপরের ফলাফল screenshot করে পাঠান।</span>');

    } catch(e) {
      log(`<span class="err">✗ বড় সমস্যা:</span><pre>${e.message}</pre>`);
    }
  </script>
</body>
</html>
