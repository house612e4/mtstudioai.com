<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">পোস্ট — MT Studio Blog</title>
  <meta name="description" id="metaDesc" content="MT Studio Blog">
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #050B14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .prose h1, .prose h2, .prose h3 { color: white; font-weight: 700; margin: 1.5em 0 0.5em; }
    .prose h1 { font-size: 1.8em; }
    .prose h2 { font-size: 1.4em; }
    .prose h3 { font-size: 1.2em; }
    .prose p { color: #cbd5e1; line-height: 1.8; margin-bottom: 1em; }
    .prose ul, .prose ol { color: #cbd5e1; padding-left: 1.5em; margin-bottom: 1em; }
    .prose li { margin-bottom: 0.5em; line-height: 1.7; }
    .prose a { color: #22d3ee; text-decoration: underline; }
    .prose strong { color: white; }
    .prose img { border-radius: 12px; max-width: 100%; margin: 1.5em auto; display: block; }
    .prose blockquote { border-left: 3px solid #22d3ee; padding-left: 1em; margin: 1.5em 0; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(5,11,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:16px 24px;">
    <div style="max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;border:1px solid rgba(6,182,212,0.3);">
          <img src="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <span style="color:white;font-weight:700;">MT Studio</span>
      </a>
      <a href="index.html#blog" style="color:#67e8f9;font-size:14px;font-weight:600;text-decoration:none;">
        <i class="fa-solid fa-arrow-left mr-1"></i> সব পোস্ট
      </a>
    </div>
  </nav>

  <!-- Post Content -->
  <main style="max-width:800px;margin:0 auto;padding:100px 24px 80px;" id="postMain">
    <!-- Loading -->
    <div id="loadingState" style="text-align:center;padding:80px 0;">
      <div style="width:48px;height:48px;border:3px solid rgba(6,182,212,0.3);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
      <p style="color:#64748b;">লোড হচ্ছে...</p>
    </div>

    <!-- Post -->
    <article id="postContent" style="display:none;">
      <!-- Cover Image -->
      <div id="coverWrap" style="display:none;margin-bottom:32px;border-radius:20px;overflow:hidden;height:360px;">
        <img id="postCoverImg" style="width:100%;height:100%;object-fit:cover;">
      </div>

      <!-- Meta -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center;">
        <span id="postCategoryBadge" style="background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);color:#67e8f9;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;"></span>
        <span id="postDate" style="color:#64748b;font-size:13px;"></span>
      </div>

      <!-- Title -->
      <h1 id="postTitleEl" style="font-size:clamp(28px,5vw,42px);font-weight:800;color:white;line-height:1.2;margin-bottom:16px;"></h1>

      <!-- Excerpt -->
      <p id="postExcerptEl" style="font-size:18px;color:#94a3b8;line-height:1.7;margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,0.08);"></p>

      <!-- Body -->
      <div id="postBody" class="prose"></div>

      <!-- Footer -->
      <div style="margin-top:64px;padding-top:32px;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
        <a href="index.html#blog" style="display:inline-flex;align-items:center;gap:8px;background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);color:#67e8f9;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:600;font-size:14px;">
          <i class="fa-solid fa-arrow-left"></i> আরও পোস্ট দেখুন
        </a>
        <a href="https://wa.me/19174199814" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:600;font-size:14px;">
          <i class="fa-brands fa-whatsapp"></i> প্রজেক্ট শুরু করুন
        </a>
      </div>
    </article>

    <!-- Not Found -->
    <div id="notFound" style="display:none;text-align:center;padding:80px 0;">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:48px;color:#f59e0b;margin-bottom:16px;"></i>
      <h2 style="color:white;font-size:24px;font-weight:700;margin-bottom:8px;">পোস্ট পাওয়া যায়নি</h2>
      <p style="color:#64748b;margin-bottom:24px;">এই পোস্টটি হয়তো মুছে ফেলা হয়েছে।</p>
      <a href="index.html#blog" style="background:#0891b2;color:white;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:600;">← ব্লগে ফিরে যান</a>
    </div>
  </main>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
      authDomain: "mt-studio-92d1e.firebaseapp.com",
      projectId: "mt-studio-92d1e",
      storageBucket: "mt-studio-92d1e.firebasestorage.app",
      messagingSenderId: "455687864985",
      appId: "1:455687864985:web:327dedaffdb7b5f8606e08"
    });
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    if (!postId) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
    } else {
      try {
        const snap = await getDoc(doc(db, 'blogPosts', postId));
        document.getElementById('loadingState').style.display = 'none';
        if (!snap.exists() || snap.data().status !== 'published') {
          document.getElementById('notFound').style.display = 'block';
        } else {
          const d = snap.data();
          document.getElementById('pageTitle').textContent = d.title + ' — MT Studio Blog';
          document.getElementById('metaDesc').content = d.excerpt;
          document.getElementById('postTitleEl').textContent = d.title;
          document.getElementById('postExcerptEl').textContent = d.excerpt;
          document.getElementById('postBody').innerHTML = d.content;
          document.getElementById('postCategoryBadge').textContent = d.category || 'General';
          document.getElementById('postDate').textContent = d.createdAt?.toDate ? d.createdAt.toDate().toLocaleDateString('bn-BD', { year:'numeric', month:'long', day:'numeric' }) : '';
          if (d.cover) {
            document.getElementById('postCoverImg').src = d.cover;
            document.getElementById('coverWrap').style.display = 'block';
          }
          document.getElementById('postContent').style.display = 'block';
        }
      } catch(err) {
        document.getElementById('loadingState').style.display = 'none';
        const notFound = document.getElementById('notFound');
        notFound.style.display = 'block';
        notFound.querySelector('h2').textContent = 'লোড করা যায়নি';
        notFound.querySelector('p').textContent = 'নেটওয়ার্ক সমস্যা। পেজ রিফ্রেশ করুন।';
      }
    }
  </script>
</body>
</html>
